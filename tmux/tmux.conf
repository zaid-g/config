# source-file <path>
# Each section (`#  %% -------- [*] ----------:`) should
# be organized in following order:
# - options
# - bindings

#  %% -------- [settings] ----------:

# set-option prefix
set-option -g prefix C-g
set-option -g status-interval 1
set-option -g mouse on
set-option -sg escape-time 0

# unbind default prefix button
unbind C-b
# remove default 'i' (pane info) so prefix+i just cancels prefix-wait
unbind i
# resource
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

#  %% -------- [appearence shape UI looks organization color (copy these to configure on diff machine)] ----------:

# terminal color
set-option -g default-terminal "tmux-256color"
set-option -as terminal-features ',xterm-256color:RGB'

# Pane borders
set-option -g pane-border-lines double
set-option -g pane-border-style fg=colour$COLOR_THEME
set-option -g pane-active-border-style fg=colour$COLOR_ACTIVE

# Status bar
set-option -g status-style "#{?client_prefix,bg=colour$COLOR_ACTIVE,bg=colour$COLOR_THEME},fg=colour$COLOR_TEXT_IF_COLORED_BACKGROUND"
set-option -g status-right '%S'
set-option -g window-status-current-style fg=colour$COLOR_TEXT_IF_COLORED_BACKGROUND,bg=colour$COLOR_HIGHLIGHT_TEXT_TMUX,bold
set-option -g window-status-style fg=colour$COLOR_TEXT_IF_COLORED_BACKGROUND,bg=colour$COLOR_THEME

# Copy mode appearence
set-option -g mode-style "fg=colour$COLOR_TEXT_IF_COLORED_BACKGROUND,bg=colour$COLOR_HIGHLIGHT_TEXT_TMUX"
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "select-pane -P bg=#$COLOR_HEX_ACTIVE_BACKGROUND" "select-pane -P bg=default"'

#  %% -------- [copy mode stuff] ----------:

# history
set-option -g history-limit 250000
# vi mode
set-option -g mode-keys vi

unbind [
# Unbind 'q' only in copy-mode-vi (so prefix+q in normal mode still works)
unbind -T copy-mode-vi q
bind Escape copy-mode
# similar to how `i` exits view mode and enters insert mode in vim
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection
bind -T copy-mode-vi 'Y' send -X copy-selection-and-cancel

# mouse copy
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

# clear history scroll
bind space clear-history \; display-message "History cleared!"
bind C-space clear-history \; display-message "History cleared!"

#  %% -------- [windows panes tabs] ----------:

# splits
bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# renumber window index when closing
set-option -g renumber-windows on

# i have my own auto rename system
set-window-option -g automatic-rename off

# h family
bind h select-pane -L
bind H splitw -fhb \; swapp -t ! \; killp -t !
bind C-h previous-window
bind -r M-h resize-pane -L 5

# j family
bind j select-pane -D
bind J splitw -fv  \; swapp -t ! \; killp -t !
bind C-j run-shell 'zsh -c "source ~/.zshrc && TMUX_SWAP_WINDOW_NEXT" >/dev/null 2>&1'
bind -r M-j resize-pane -D 5

# k family
bind k select-pane -U
bind K splitw -fvb \; swapp -t ! \; killp -t !
bind C-k run-shell 'zsh -c "source ~/.zshrc && TMUX_SWAP_WINDOW_PREV" >/dev/null 2>&1'
bind -r M-k resize-pane -U 5

# l family
bind l select-pane -R
bind L splitw -fh  \; swapp -t ! \; killp -t !
bind C-l next-window
bind -r M-l resize-pane -R 5

# e family
bind e select-window -t '{end}'
bind C-e run-shell 'tmux move-window -t 999 && tmux move-window -r'

# n family
bind n new-window -a -c "#{pane_current_path}" -n "#{window_name}"
bind N run-shell 'zsh -c "source ~/.zshrc && TCOBPJ" >/dev/null 2>&1'
bind C-n command-prompt -p 'Name (no special chars):' 'run-shell "zsh -c \"source ~/.zshrc && TCOBPJ %1\" >/dev/null 2>&1"'
bind M-n new-window \; send-keys 'CDJ' Enter

# switch to last active tab (like alt-tab)
bind C-g last-window

# send pane to specific window position e.g. 1.0
bind M command-prompt -p "send pane to:"  "join-pane -t '%%'"

# rename pane
bind , command-prompt -I "#W" "rename-window '%%'; set-window-option @AUTORENAME 0"
# lock tab name (disable auto-rename)
bind R set-window-option @AUTORENAME 0

bind X confirm-before -p "Kill window #W? (y/n)" kill-window
